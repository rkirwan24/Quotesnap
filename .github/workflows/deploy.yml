name: Deploy to Vercel

on:
  push:
    branches: [main, claude/deploy-quotesnap-vercel-7PXyA]
  workflow_dispatch:

jobs:
  provision-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check & provision Vercel Postgres
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          # ── 1. Find the Vercel project ───────────────────────────────────────
          echo "🔍 Finding Vercel project..."
          PROJECTS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects?limit=100" || echo '{"projects":[]}')

          PROJECT_ID=$(echo "$PROJECTS" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const ps = JSON.parse(d).projects || [];
                const p = ps.find(p =>
                  (p.name||'').toLowerCase().includes('quotesnap') ||
                  (p.alias||[]).some(a=>(a.domain||a||'').includes('quotesnap'))
                );
                console.log(p ? p.id : '');
              } catch(e){ console.log(''); }
            });
          " || echo "")

          if [ -z "$PROJECT_ID" ]; then
            echo "⚠️  Could not find project — skipping auto-provision"
            exit 0
          fi
          echo "✅ Project ID: $PROJECT_ID"

          # ── 2. Check if POSTGRES_URL already set ────────────────────────────
          ENV_VARS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects/$PROJECT_ID/env" || echo '{"envs":[]}')

          EXISTING=$(echo "$ENV_VARS" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const envs = JSON.parse(d).envs || [];
                console.log(envs.find(e => e.key === 'POSTGRES_URL') ? 'yes' : '');
              } catch(e){ console.log(''); }
            });
          " || echo "")

          if [ -n "$EXISTING" ]; then
            echo "✅ POSTGRES_URL already set — nothing to do"
            exit 0
          fi

          # ── 3. Check for existing stores to link ────────────────────────────
          echo "🔍 Looking for existing Postgres stores..."
          STORES=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v1/storage?limit=20&resourceType=postgres" || echo '{"stores":[]}')
          echo "Stores response: $(echo "$STORES" | head -c 400)"

          STORE_ID=$(echo "$STORES" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try { console.log((JSON.parse(d).stores||[])[0]?.id || ''); }
              catch(e){ console.log(''); }
            });
          " || echo "")

          # ── 4. Link existing store if found ─────────────────────────────────
          if [ -n "$STORE_ID" ]; then
            echo "🔗 Linking existing store $STORE_ID to project..."
            curl -sf -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"postgres\",\"storeId\":\"$STORE_ID\"}" \
              "https://api.vercel.com/v9/projects/$PROJECT_ID/storage" | head -c 300 || true
            echo ""
            sleep 3
          else
            # ── 5. Create new Postgres store ─────────────────────────────────
            echo "🗄️  Creating new Postgres database..."
            NEW_STORE=$(curl -sf -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"quotesnap-db\",\"projectIds\":[\"$PROJECT_ID\"]}" \
              "https://api.vercel.com/v1/storage/postgres" || echo '{}')

            echo "Creation response: $(echo "$NEW_STORE" | head -c 600)"

            # Parse connection string — try all known formats
            PG_URL=$(echo "$NEW_STORE" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try {
                  const j = JSON.parse(d);
                  const url =
                    (Array.isArray(j.env) && (j.env.find(e=>e.key==='POSTGRES_URL')?.value)) ||
                    j.connectionString ||
                    j.connection?.connectionString ||
                    j.dsn?.connectionString ||
                    j.database?.connectionString ||
                    j.database?.dsn ||
                    j.store?.connectionString ||
                    j.url || '';
                  console.log(url);
                } catch(e){ console.log(''); }
              });
            " || echo "")

            if [ -n "$PG_URL" ]; then
              echo "🔑 Setting POSTGRES_URL on project..."
              curl -sf -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "[{\"key\":\"POSTGRES_URL\",\"value\":\"$PG_URL\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\",\"development\"]}]" \
                "https://api.vercel.com/v9/projects/$PROJECT_ID/env" > /dev/null
              echo "✅ POSTGRES_URL set!"
              exit 0
            fi

            sleep 3
          fi

          # ── 6. Re-check if env var was auto-set by Vercel ───────────────────
          ENV_VARS2=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects/$PROJECT_ID/env" || echo '{"envs":[]}')

          AUTO_SET=$(echo "$ENV_VARS2" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const envs = JSON.parse(d).envs || [];
                console.log(envs.find(e => e.key === 'POSTGRES_URL') ? 'yes' : '');
              } catch(e){ console.log(''); }
            });
          " || echo "")

          if [ -n "$AUTO_SET" ]; then
            echo "✅ POSTGRES_URL was auto-set by Vercel"
            exit 0
          fi

          # ── 7. Manual fallback ───────────────────────────────────────────────
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  AUTO-PROVISION FAILED — MANUAL STEP NEEDED (2 min):"
          echo ""
          echo "  1. Go to: vercel.com → your project → Storage tab"
          echo "  2. Click 'Connect Store' → Create New → Postgres"
          echo "  3. Accept defaults → Create & Continue"
          echo "     (Vercel adds POSTGRES_URL automatically)"
          echo "  4. Come back here → Actions → Re-run workflow"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  deploy:
    runs-on: ubuntu-latest
    needs: provision-db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"
