name: Deploy to Vercel

on:
  push:
    branches: [main, claude/deploy-quotesnap-vercel-7PXyA]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── Find project + provision Postgres ────────────────────────────────────
      - name: Provision Postgres & resolve project IDs
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            echo "⚠️  VERCEL_TOKEN not set — skipping provision; relying on Vercel git integration"
            exit 0
          fi

          # ── Get account/team context ─────────────────────────────────────
          USER_INFO=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v2/user" || echo '{}')
          TEAM_ID=$(echo "$USER_INFO" | node -e "
            let d='';process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{console.log(JSON.parse(d).user?.defaultTeamId||'');}
              catch(e){console.log('');}
            });")
          TPARAM="${TEAM_ID:+?teamId=$TEAM_ID}"
          [ -n "$TEAM_ID" ] && echo "👥 Team: $TEAM_ID"

          # ── Find the project ──────────────────────────────────────────────
          PROJECTS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects?limit=100${TEAM_ID:+&teamId=$TEAM_ID}" \
            || echo '{"projects":[]}')
          PROJECT=$(echo "$PROJECTS" | node -e "
            let d='';process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{
                const ps=JSON.parse(d).projects||[];
                const p=ps.find(p=>(p.name||'').toLowerCase().includes('quotesnap'));
                if(p) process.stdout.write(p.id+'|'+p.name);
              }catch(e){}
            });")
          if [ -z "$PROJECT" ]; then
            echo "⚠️  QuoteSnap project not found — skipping provision"
            exit 0
          fi
          PROJECT_ID="${PROJECT%%|*}"
          PROJECT_NAME="${PROJECT##*|}"
          echo "✅ Project: $PROJECT_NAME ($PROJECT_ID)"

          # Write IDs so the deploy step can use them
          echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "VERCEL_ORG_ID=${TEAM_ID:-$(echo "$USER_INFO" | node -e "
            let d='';process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{console.log(JSON.parse(d).user?.id||'');}
              catch(e){console.log('');}
            });" || echo "")}" >> $GITHUB_ENV

          # ── Check if POSTGRES_URL already set ─────────────────────────────
          ENVS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects/$PROJECT_ID/env${TPARAM}" \
            || echo '{"envs":[]}')
          HAS_PG=$(echo "$ENVS" | node -e "
            let d='';process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{const e=JSON.parse(d).envs||[];console.log(e.find(e=>e.key==='POSTGRES_URL')?'yes':'');}
              catch(e){console.log('');}
            });")
          if [ -n "$HAS_PG" ]; then
            echo "✅ POSTGRES_URL already configured"
            exit 0
          fi
          echo "📭 POSTGRES_URL not set — attempting to provision..."

          # ── List existing stores ───────────────────────────────────────────
          STORES=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v1/storage?limit=20&resourceType=postgres${TEAM_ID:+&teamId=$TEAM_ID}" \
            || echo '{}')
          echo "Stores: $(echo "$STORES" | head -c 300)"
          STORE_ID=$(echo "$STORES" | node -e "
            let d='';process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{const a=JSON.parse(d).stores||JSON.parse(d).data||[];console.log(a[0]?.id||'');}
              catch(e){console.log('');}
            });" || echo "")

          if [ -n "$STORE_ID" ]; then
            echo "🔗 Linking store $STORE_ID..."
            curl -sf -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"postgres\",\"storeId\":\"$STORE_ID\"}" \
              "https://api.vercel.com/v9/projects/$PROJECT_ID/storage${TPARAM}" \
              | head -c 300 || true
            echo ""; sleep 5
          else
            echo "🗄️  Creating new Postgres store..."
            BODY="{\"name\":\"quotesnap-db\",\"projectIds\":[\"$PROJECT_ID\"]${TEAM_ID:+,\"teamId\":\"$TEAM_ID\"}}"
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "https://api.vercel.com/v1/storage/postgres${TPARAM}")
            CODE=$(echo "$RESP" | tail -1)
            RBODY=$(echo "$RESP" | sed '$d')
            echo "HTTP $CODE: $(echo "$RBODY" | head -c 600)"

            PG_URL=$(echo "$RBODY" | node -e "
              let d='';process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try{
                  const j=JSON.parse(d);
                  console.log(
                    (Array.isArray(j.env)&&j.env.find(e=>e.key==='POSTGRES_URL')?.value)||
                    j.connectionString||j.connection?.connectionString||
                    j.store?.connectionString||j.url||'');
                }catch(e){console.log('');}
              });" || echo "")
            if [ -n "$PG_URL" ]; then
              curl -sf -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "[{\"key\":\"POSTGRES_URL\",\"value\":\"$PG_URL\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\",\"development\"]}]" \
                "https://api.vercel.com/v9/projects/$PROJECT_ID/env${TPARAM}" > /dev/null
              echo "✅ POSTGRES_URL set!"
              exit 0
            fi
            sleep 5
          fi

          # ── Re-check ──────────────────────────────────────────────────────
          ENVS2=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects/$PROJECT_ID/env${TPARAM}" || echo '{"envs":[]}')
          HAS_PG2=$(echo "$ENVS2" | node -e "
            let d='';process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try{const e=JSON.parse(d).envs||[];console.log(e.find(e=>e.key==='POSTGRES_URL')?'yes':'');}
              catch(e){console.log('');}
            });" || echo "")
          if [ -n "$HAS_PG2" ]; then
            echo "✅ POSTGRES_URL auto-set by Vercel"; exit 0
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  POSTGRES_URL still not set. You connected Postgres in the"
          echo "   Vercel dashboard — make sure it was added to the PRODUCTION"
          echo "   environment (not just Preview or Development)."
          echo "   vercel.com → project → Settings → Environment Variables"
          echo "   Confirm POSTGRES_URL exists for 'Production' target."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Deploy to Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
